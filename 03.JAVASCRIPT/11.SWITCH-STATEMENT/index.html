      let day = prompt("Enter any day (Sunday to Wednesday)");

      switch (day.toLowerCase()) {
        case "sunday":
          console.log("User entered", day);
          break;
        case "monday":
          console.log("User entered", day);
          break;
        case "tuesday":
          console.log("User entered", day);
          break;
        case "wednesday":
          console.log("User entered", day);
          break;

        default:
          console.log("Enter only the day between Sunday to Wednesday");
      }
    </script>
