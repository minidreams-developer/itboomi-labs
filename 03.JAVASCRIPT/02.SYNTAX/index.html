<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Syntax</title>
</head>
<body>
    <h1>JAVASCRIPT SYNTAX</h1>

    <script>
        // variable decrlation methods

        // let , const, var

        // let & const => ES6 (2015)
        // var

        // 1. Initialization
        // 2. Declaration

        // [declaration-method] [variable-name] = [value]

        let fruit = "Apple";

        console.log(fruit)
        console.log("Orange")


        /*
            1. variable initialization
            let variable;

            2. variable/value declaration
            variable = value;
        
        
        */

        let vegitables;

        vegitables = "Carrot";


    </script>
</body>
</html>
