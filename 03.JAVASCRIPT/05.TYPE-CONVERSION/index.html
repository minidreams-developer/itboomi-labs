<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type Conversion</title>
</head>
<body>
    <h1>Type Conversion</h1>


    <script>
        // type conversion
        // string => number, 
        // number => string
        // boolean => number
        // number => boolean
        

        // Implicit Conversion
            // Javascript automatically converts it to you.
        // Explicit Conversion
            // We manually converts the value

    /*
        1. String conversion ( convert it as string)
        2. Number conversion ( convert it as Number)
        3. Boolean conversion ( convert it as Boolean)
    
    
    
    */

    // String conversion
    let isAdult = true;
    let num = 7877;

    console.log("Before conversion",typeof isAdult)
    console.log("Before conversion",typeof num)
    // String(variable)

    let stringAdult = String(isAdult);

    console.log("AFter conversion",typeof stringAdult)


    // Number conversion;
    let age = "454";  // numerical string

    let convertedAge = Number(age);
    console.log("Converted Numerical String", convertedAge)
    console.log("Converted Numerical String",typeof convertedAge)

    let name = "Tony";

    let convertedName = Number(name);
    console.log("Converted Normal String", convertedName)
     console.log("Converted Normal String",typeof convertedName)
     /*
        string => NaN
        Numerical string  => Number
        boolean  => 0 / 1
        null => 0
        undefined => NaN
     */


    //  let value = 234_55_67_78;

    //  console.log("empty space value", value)

    // Boolean conversion

    let myAge = 25;

    let convertedMyAge = Boolean(myAge);

    console.log("Converted Boolean", convertedMyAge)

    // rules
    /*
        false => 0, "", null, undefined, NaN
        true  => everything else is true
    
    */

    let noValue = null;
    let convertedNoValue = Boolean(noValue);

    console.log("Converted Null", convertedNoValue);
    
    </script>
</body>
</html>
