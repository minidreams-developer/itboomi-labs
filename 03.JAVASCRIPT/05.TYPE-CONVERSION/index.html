<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type Conversion</title>
</head>
<body>
    <h1>Type Conversion</h1>


    <script>
        // type conversion
        // string => number, 
        // number => string
        // boolean => number
        // number => boolean
        

        // Implicit Conversion
            // Javascript automatically converts it to you.
        // Explicit Conversion
            // We manually converts the value

    /*
        1. String conversion ( convert it as string)
        2. Number conversion ( convert it as Number)
        3. Boolean conversion ( convert it as Boolean)
    
    
    
    */

    // String conversion
    let isAdult = true;
    let num = 7877;

    console.log("Before conversion",typeof isAdult)
    console.log("Before conversion",typeof num)
    // String(variable)

    let stringAdult = String(isAdult);

    console.log("AFter conversion",typeof stringAdult)


    
    </script>
</body>
</html>
