<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Types</title>
</head>
<body>
    <h1>Data Types</h1>

    <script>
        // DATA TYPES
        // It will differ for each languages
        // Python   => integer, string, float, double, 

        /*
            TWO-CATEGORIES
            1. Primitive Data Types (basic or fundamental data types)
                i) Numbers   (45524555555555555555555555555555555555555555555555555555555555555555)
                ii) String
                iii) Boolean (true / false  0=> false, 1=true)
                iv) Bigint
                v) null
                vi) undefined
                vii) symbol

            2. Non-Primitive Data Types (advanced data types)
                i) Objects
                ii) Arrays
                iii) Function
        
        */

        /*
            Declaration Case
            1. camelCase
            2. PascalCase

            camelCase => each second word starting letter in CAPS. (arunPrince)
            PascalCase => each word first letter in CAPS. (ArunPrince)
        
        */

        // Primitive Data Types
        // Number - whole number, decimal, infinity, -infinity, NaN
        let wholeNumber = 50;
        let decimalNumber = 45.987;
        let unlimited = Infinity;
        let negativeUnlimited = -Infinity;


        // type of variableNames
        console.log("WholeNumber======>",typeof wholeNumber)
        console.log("Decimal Number=====>",typeof decimalNumber);
        console.log("Unlimited=====>",typeof unlimited)
        console.log("Negative Unlimited=====>",typeof negativeUnlimited)

        console.log("================================STRING=============================")


        // Strings
        // Syntax

        // three ways
        // 1) single quote => '   '
        // 2) double quote => "   "
        // 3) backticks    => `   `

        let name = "Dinesh";
        let userName = "Dinesh0987";

        console.log("name=======>", name)
        console.log("username=====>", userName)

        // Template literal
        // `${variable}`

        console.log(`My name is ${name}`)

        let combinedName = `${name} + ${userName}`



        console.log("==============================BOOLEAN======================================")
        // Boolean  - conditional rendering
        // Syntax => true or false
        let isAdmin = true;

        console.log("Boolean===>", isAdmin)
        
    </script>
</body>
</html>
