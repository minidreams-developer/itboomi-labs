<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops</title>
</head>
<body>
    <h1>Basic Loops</h1>

    <script>
        // Loops
        // It executing a set of statement in repeat until some condition met.
        // console or print 1 to 10
        console.log(1)
        console.log(2);
        console.log(3);
        

        // Basic Loops
        // Three types of basic loops

        // 1. while
        // 2. do...while
        // 3. for(;;)

        /*
            Loops creation procedure
            1. Initialization => starting of loop
            2. condition => when the loop end
            3. Increment / Decrement
        
        */

        // while => entry check loop
        // syntax
        /*
            let i = value;
            while(condition){
                loop body
                Increment/decrement
            
            }  
        
        
        */

        // requirement -> print 1 to 10
        // unary operator ()
                                                // Iteration-1           // Iteration-2          // Iteration 10       iteration 11
        let i = 1;                               // i = 1;                i = 2                   i = 10                i = 11
        while(i <= 10){                          // 1 <= 10 => true       2 <= 10 => true         10 <= 10 =>true   11 <= 10 false
            console.log("Value if I", i);        // Value of I, 1         Value of I, 2           Value of I, 10
            i++;                                 // 1++ => 2              2++ => 3                10++ => 11
            
        }

        
    </script>
</body>
</html>
