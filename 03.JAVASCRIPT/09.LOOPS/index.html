      /*
            Loops creation procedure
            1. Initialization => starting of loop
            2. condition => when the loop end
            3. Increment / Decrement
        
        */

      // while => entry check loop
      // syntax
      /*
            let i = value;
            while(condition){
                loop body
                Increment/decrement
            
            }  
        
        
        */

      // requirement -> print 1 to 10
      // unary operator ()
      // Iteration-1           // Iteration-2          // Iteration 10       iteration 11
      let i = 0; // i = 1;                i = 2                   i = 10                i = 11
      while (i <= 10 && i > 0) {
        // 1 <= 10 => true       2 <= 10 => true         10 <= 10 =>true   11 <= 10 false
        console.log("Value if I", i); // Value of I, 1         Value of I, 2           Value of I, 10
        i++; // 1++ => 2              2++ => 3                10++ => 11
      }

      // requirement -> print first 10 even numbers   4/2 => 2 - 0,

                                                         // Iteration 1                       Iteration 2
      let j = 2;                                         // j = 2;                            j = 3
      while (j <= 20) {                                  // 2 <= 20 => true                   3 <= 20 => true 
        if (j % 2 === 0) {                               // 2 % 2 === 0 => true               3 % 2 === 1 => false
          console.log("Even Number", j);                 // Even Number, 2                    skip the if block
        }                                                // 2++ => 3                           3++ => 4
        j++;
      }

        }while(condition)
