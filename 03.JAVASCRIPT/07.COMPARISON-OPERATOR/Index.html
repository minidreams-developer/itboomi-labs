<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparison Operator</title>
</head>
<body>
    <h1>Comparison Operator</h1>
    <script>
        // comparison operator
        // <, >, <=, >=, !=, ==, =, ===

        /*
            1. Less than =>                  <
            2. Greater than =>               >
            3. equals to   =>                ==
            4. greater than equals to  =>    >= 
            5. Less than equals to =>        <=
            6. not equals to =>               !=
            7. Strict equals to =>          ===
        
            It compares two or more values and output Boolean(true/false)
            Implicit type conversion happens

            eg: 
                value 1 {comparison operator} value 2 => result [converted as boolean]

                2 > 5 = true/ false
        */

        // 1. Less than (<)
        let num1 = 60;
        let num2 = 50;

        console.log("num1 < num2===>", num1 < num2)  // 60 < 50 => false

        // 2. Greater than (>)
        // workout yourself

        // 3. Equals to

        let num3 = 30;
        let num4 = 30;

        console.log("num3 == num4===>", num3 == num4)

        // 4. greater than equals to
        // 5. less than equals to 
            // workout


        // 6. Not equals to (!=)

        console.log("num1 != num2==>", num3 != num4);


        // 7. Strict equals to

        console.log("num1 === num2===>", num3 === num4);
        
        
    </script>
</body>
</html>
