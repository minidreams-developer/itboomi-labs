<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Selectors</title>
    <style>
        h2{
            border: 2px black dashed;
            padding: 30px;
            display: inline;
            margin: 10px;
        }
        .odd{
            background-color: aquamarine;
        }
        .even{
            background-color: cornflowerblue;
        }
        #head4{
            color: red;
        }
    </style>
</head>
<body>
    <h1>Class selectors</h2>

    <h2 class="odd">Heading</h2>
    <h2 class="even">Heading</h2>
    <h2 class="odd">Heading</h2>
    <h2 class="even" id="head4">Heading</h2>
    <h2 class="odd">Heading</h2>
    <h2 class="even">Heading</h2>
    <h2 class="odd">Heading</h2>
    <h2 class="even">Heading</h2>
</body>
</html>
