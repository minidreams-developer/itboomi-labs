<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors</title>
</head>
<body>
    <h1>Selectors <b>Hello</b></h1>
    <h2>sibling selector</h2>
    <!-- 
        1. ID selector: #id
        2. Class selector: .class
        3. Element selector: element
        4. Attribute selector: [attribute=value]
        5. CSS - RULES
        6. Descendant selector: parent child
        7. Child selector: parent > child
        8. Adjacent sibling selector: element + element
        9. General sibling selector: element ~ element
    
    
    -->
</body>
</html>
