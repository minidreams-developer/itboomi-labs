<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relative Position</title>
    <style>
           p{
            border: 1px solid black;
            padding: 5px;
        }
        /* 
            relative: position is changes relative to it's original place
        
        */

        .main{
            background-color: greenyellow;
            position: relative;
            top: 55px;
            left: 100px;
        }
    </style>
</head>
<body>
    <h1>Relative position</h1>

     <p>This is a normal paragagraph</p>
    <p class="main">This is a paragaraph positioned using static</p>
    <p>This is a normal paragaraph</p>
</body>
</html>
