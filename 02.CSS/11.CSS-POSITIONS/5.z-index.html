<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        /* 
            z-index => position: relative and absolute
            stacking of the element
        */
        .container{
            min-height: 400px;
            width: 400px;
            border: 2px solid black;
            position: relative;
            left: 500px;

        }

        img{
            height: 200px;
            width: 200px;
            position: absolute;
        }

        .two{
            z-index: 1;
            top: 100px;
            left: 100px;

        }

        .three{
            z-index: 999;
            top: 150px;
            left: 150px;
        }
    </style>
</head>
<body>
    <h1>CSS - Z-index</h1>
    <div class="container">
        <img src="../09.BACKGROUNDS/Assets/img-one-bg.jpg" alt="image-one" class="one">
        <img src="../09.BACKGROUNDS/Assets/img-two-bg.jpg" alt="image-two" class="two">
        <img src="../09.BACKGROUNDS/Assets/OIP.webp" alt="image-three" class="three">
    </div>
</body>
</html>
