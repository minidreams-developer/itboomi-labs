<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - TYPES OF CONNECT</title>
    <!-- External stylesheet -->
    <link rel="stylesheet" href="./style.css">
    <style>
        /* Internal CSS */
        body{
            background-color: beige
        }
    </style>
</head>
<body>
    <h1>Types of Connect</h1>
    <!-- 
        1. Internal -> Inside the <head> tag using <style> tag
        2. External -> Using <link> tag to link an external CSS file
        3. Inline -> Using style attribute inside the HTML tag

        style="property:value; property:value;,,property-n:value;"
    -->

    <p style="color: red; text-decoration: line-through;">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Impedit consequatur minus corrupti repudiandae sint quisquam molestiae quod doloribus cumque architecto.
    </p>
</body>
</html>
