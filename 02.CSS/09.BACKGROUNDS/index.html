<body>
    <h1>CSS - backgrounds</h1>
    <!-- 
        1. Background image
                    background: url("image url or path")
        2. Background repeats
                    background-repeat: 1. repeat (default)
                                       2. repeat-x
                                       3. repeat-y
                                       4. no-repeat

        3. Background position
                    background-position: left or right or top or bottom or center
        4. Background Size
                    background-size: auto (default), cover, contain

        5. Background Attachement
                    background-attachment: scroll or fixed
    
    -->
