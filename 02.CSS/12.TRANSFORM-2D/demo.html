<!DOCTYPE html>
<html>
<head>
  <style>
    .container {
      width: 400px;
      height: 120px;
      border: 2px solid #ccc;
      position: relative;
      margin: 50px auto;
      overflow: hidden;
    }

    .box {
      width: 50px;
      height: 50px;
      background: dodgerblue;
      position: absolute;
      top: 35px;

      animation: moveAndScale 3s infinite ease-in-out;
    }

    @keyframes moveAndScale {
      0% {
        transform: translateX(0) scale(1);
      }

      50% {
        transform: translateX(300px) scale(1.5);
      }

      100% {
        transform: translateX(0) scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box"></div>
  </div>
</body>
</html>
