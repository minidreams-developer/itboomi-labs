<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - 2D ANIMATION</title>
    <style>
        .transform{
            height: 200px;
            width: 200px;
            background-color: aquamarine;
        }

        .transform:hover{
                /* transform: translateX(100px);
                transform: translateY(70px); */
                transform: translate(100px, 70px);
        }
    </style>
</head>
<body>
    <!-- 
        Transform 2d animations
        1. Translate
        2. Scale
        3. Rotate
        4. Skew
    -->

    <!-- 
        1. Translate => move things horizontally or verticaly

        Syntax:
            transform: translate(x, y) shorthand property
                x => horizontal distance (px, %, em, rem) also can enter positive or negative values
                y => vertical distance (px, %, em, rem) also can enter positive or negative values
    
    -->

    <h1>CSS-ANIMATIONS</h1>
    <div class="transform">
        <h2>Translate</h2>
    </div>
</body>
</html>
