<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-SKEW ANIMATIONS</title>
    <style>
        .skew{
            height: 200px;
            width: 200px;
            background-color: gray;
            margin: 0 auto;
        }

        .skew:hover{
            transform: skew(90deg);
        }

        h2{
            color: blue;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body>
    <h1>SKEW - ANIMATIONS</h1>
    <!-- 
        Skewed based on angle

        Syntax:
           transform: skew(angle)
    -->

    <div class="skew">
        <h2>Skew</h2>
    </div>
</body>
</html>
