<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Animation Demo</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    font-family: Arial, sans-serif;
}

.container {
    position: relative;
    width: 100%;
    height: 100%;
}

.box {
    position: absolute;
    width: 120px;
    height: 120px;
    background: linear-gradient(45deg, #06b6d4, #3b82f6);
    border-radius: 24px;
    left: 50%;
    top: 50%;
    margin-left: -60px;
    margin-top: -60px;
    box-shadow:
        0 0 20px rgba(6,182,212,.5),
        0 0 40px rgba(59,130,246,.3);
}

.label {
    position: fixed;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 2px;
}

/* ==========================
   DESKTOP (>1024px)
   ========================== */
@media (min-width: 1025px) {

    .label::after {
        content: "DESKTOP";
    }

    .box {
        animation: desktopAnim 6s infinite ease-in-out;
    }

    @keyframes desktopAnim {

        0% {
            transform:
                translate(-400px,0)
                rotate(0deg)
                scale(1);
            border-radius: 20px;
        }

        25% {
            transform:
                translate(0,-250px)
                rotate(180deg)
                scale(1.3);
            border-radius: 50%;
        }

        50% {
            transform:
                translate(400px,0)
                rotate(360deg)
                scale(.9);
            border-radius: 10px;
        }

        75% {
            transform:
                translate(0,250px)
                rotate(540deg)
                scale(1.4);
            border-radius: 50%;
        }

        100% {
            transform:
                translate(-400px,0)
                rotate(720deg)
                scale(1);
            border-radius: 20px;
        }
    }
}

/* ==========================
   TABLET (768px-1024px)
   ========================== */
@media (min-width:768px) and (max-width:1024px) {

    .label::after {
        content: "TABLET";
    }

    .box {
        animation: tabletAnim 5s infinite ease-in-out;
    }

    @keyframes tabletAnim {

        0% {
            transform:
                translate(0,0)
                scale(1)
                rotate(0deg);
        }

        20% {
            transform:
                translate(200px,-150px)
                scale(1.2)
                rotate(90deg);
        }

        40% {
            transform:
                translate(0,-250px)
                scale(.8)
                rotate(180deg);
        }

        60% {
            transform:
                translate(-200px,-150px)
                scale(1.3)
                rotate(270deg);
        }

        80% {
            transform:
                translate(0,100px)
                scale(.9)
                rotate(360deg);
        }

        100% {
            transform:
                translate(0,0)
                scale(1)
                rotate(450deg);
        }
    }
}

/* ==========================
   MOBILE (<768px)
   ========================== */
@media (max-width:767px) {

    .label::after {
        content: "MOBILE";
    }

    .box {
        width: 90px;
        height: 90px;
        margin-left: -45px;
        margin-top: -45px;
        animation: mobileAnim 3s infinite ease-in-out;
    }

    @keyframes mobileAnim {

        0% {
            transform:
                translateX(-120px)
                skewX(0deg)
                scale(1);
        }

        20% {
            transform:
                translateX(120px)
                skewX(20deg)
                scale(1.2);
        }

        40% {
            transform:
                translateX(-100px)
                skewX(-20deg)
                scale(.8);
        }

        60% {
            transform:
                translateX(100px)
                skewY(20deg)
                scale(1.3);
        }

        80% {
            transform:
                translateX(-80px)
                skewY(-20deg)
                scale(.9);
        }

        100% {
            transform:
                translateX(-120px)
                skewX(0deg)
                scale(1);
        }
    }
}
</style>
</head>

<body>

<div class="label"></div>

<div class="container">
    <div class="box"></div>
</div>

</body>
</html>
