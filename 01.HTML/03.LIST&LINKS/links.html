<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links tag</title>
</head>
<body>
    <h1>Links Tag</h1>
    <!-- 
        1. Internal Links: These are links that point to other pages within the same website. They help users navigate through the site and can also improve SEO by distributing page authority.
        2. External Links: These are links that point to pages on different websites. They can provide additional information or resources to users and can also help establish credibility and authority for your site.
    
    

        Anchor tags:
        <a href="https://www.google.com">clickable link</a>

    -->

    <h2>External Tags</h2>
    <a href="https://www.google.com">Google</a>
    <a href="https://www.facebook.com">Facebook</a>
</body>
</html>
