<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List tags</title>
</head>
<body>
    <h1>List Tags</h1>

    <!-- 
        There are three types of list tags in HTML:
        1. <ul> - Unordered List: This tag is used to create a list of items where the order does not matter. Each item in the list is typically marked with a bullet point.
        2. <ol> - Ordered List: This tag is used to create a list of items where the order does matter. Each item in the list is typically marked with a number or letter.
        3. <dl> - Description List: This tag is used to create a list of terms and their descriptions. Each term is defined using the <dt> tag, and its description is provided using the <dd> tag. 
    
    
    -->

    <h2>Unordered List</h2>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>

    <h2>Ordered List</h2>
    <ol>
        <li>First Item</li>
        <li>Second Item</li>
        <li>Third Item</li>
    </ol>
</body>
</html>
